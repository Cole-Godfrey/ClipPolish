name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test-and-safety:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Ensure ripgrep
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            brew install ripgrep
          fi

      - name: Run unit tests
        run: swift test

      - name: Run safety checks
        run: make verify-phase1-safety
