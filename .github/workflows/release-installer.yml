name: Release Installer

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-attach-installer:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          VERSION="${{ github.event_name == 'release' && github.event.release.tag_name || '' }}"
          if [[ -z "$VERSION" && "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            VERSION="$GITHUB_REF_NAME"
          fi
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build installer
        shell: bash
        run: |
          if [[ -n "${{ steps.version.outputs.version }}" ]]; then
            bash scripts/build-release-installer.sh "${{ steps.version.outputs.version }}"
          else
            bash scripts/build-release-installer.sh
          fi

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: clip-polish-installer
          path: dist/*.pkg
          if-no-files-found: error

      - name: Attach installer to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.pkg
